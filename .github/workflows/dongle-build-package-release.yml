name: DONGLE - OpenFIRE Build Package and Upload release assets - DONGLE

on:
  workflow_dispatch:
    inputs:
      sistemi_operativi:
        description: "Vuoi Creare anche i file per i sistemi operativi ? (necessario per creare release)"
        required: true
        default: "no"
        type: choice
        options:
          - "no"
          - "yes"
      release:
        description: "Vuoi creare una release ?"
        required: true
        default: "no"
        type: choice
        options:
          - "no"
          - "yes"
      tag_name:
        description: "Tag della release (es. v1.2.0 - es. v6.0-RC6) (usato solo se release=yes)"
        required: false
        default: ""
      release_name:
        description: "Nome leggibile della release (es. v6.0-RC6 OpenFIRE Firmware ESP32 DONGLE- Release Candidate) (usato solo se release=yes)"
        required: false
        default: ""
      draft:
        description: "Vuoi impostare la release come DRAFT e quindi NON pubblicare subito la release ? (false = NO,pubblica subito  - true = SI,lascialo in draft mode)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"  
      prerelease:
        description: "E' una pre-release ? (false = NO  - true = SI, imposta il flag pre-release)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"  

permissions:
  contents: write

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    name: Build DONGLE Firmware for ${{ matrix.boards }}
    strategy:
      matrix:
        include:
          - name: 'ESP32_S3_WROOM1_DevKitC_1_N16R8' 
            boards: 'ESP32_S3_WROOM1_DevKitC_1_N16R8'
            chip: 'esp32s3'
            flash_size: '16MB'
            flash_mode: 'dio'
            flash_freq: '80m'
            address_littleFS: '0xc90000'
          - name: 'WAVESHARE_ESP32_S3_PICO' 
            boards: 'WAVESHARE_ESP32_S3_PICO'
            chip: 'esp32s3'
            flash_size: '16MB'
            flash_mode: 'dio'
            flash_freq: '80m'       
            address_littleFS: '0xc90000'
          - name: 'LILYGO_T_DONGLE_S3' 
            boards: 'LILYGO_T_DONGLE_S3'
            chip: 'esp32s3'
            flash_size: '16MB'
            flash_mode: 'dio'
            flash_freq: '80m'       
            address_littleFS: '0xc90000'

    steps:
      - name: Checkout repository OpenFIRE-DONGLE-Esp32
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PlatformIO Core
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Install esptool dependencies
        run: |
          pip install --upgrade rich_click intelhex    

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}

      - if: (matrix.chip == 'esp32s3')
        name: Build DONGLE firmware OpenFIRE ESP32-S3 - FLASH ${{ matrix.flash_size }} - Compile for ${{ matrix.boards }}
        run: |
          cd dongle
          pio run -e ${{ matrix.boards }}
          python ~/.platformio/packages/tool-esptoolpy/esptool.py --chip ${{ matrix.chip }} merge_bin -o OpenFIRE-DONGLE-${{ matrix.boards }}.bin --flash_mode ${{ matrix.flash_mode }} --flash_size ${{ matrix.flash_size }} \
            0x0000 .pio/build/${{ matrix.boards }}/bootloader.bin \
            0x8000 .pio/build/${{ matrix.boards }}/partitions.bin \
            0xe000 ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
            0x10000 .pio/build/${{ matrix.boards }}/firmware.bin
          
      - name: Upload OpenFIRE DONGLE firmware
        uses: actions/upload-artifact@v4.6.1
        with:
          name: OpenFIRE-DONGLE-${{ matrix.boards }}
          path: dongle/OpenFIRE-DONGLE-${{ matrix.boards }}.bin
          if-no-files-found: error

  package_assets:
    name: Package for ${{ matrix.boards.name }} on ${{ matrix.os_config.name }}
    needs: build_firmware
    if: ${{ github.event.inputs.sistemi_operativi == 'yes' }}
    runs-on: ${{ matrix.os_config.runner }}
    strategy:
      matrix:
        boards:
          - name: 'ESP32_S3_WROOM1_DevKitC_1_N16R8' 
            chip: 'esp32s3'
            flash_size: '16MB'
            flash_mode: 'dio'
            flash_freq: '80m'
          - name: 'WAVESHARE_ESP32_S3_PICO' 
            chip: 'esp32s3'
            flash_size: '16MB'
            flash_mode: 'dio'
            flash_freq: '80m'
          - name: 'LILYGO_T_DONGLE_S3' 
            chip: 'esp32s3'
            flash_size: '16MB'
            flash_mode: 'dio'
            flash_freq: '80m'
          
        os_config:
          - name: windows-64bit
            runner: windows-latest
            esptool_url: https://github.com/espressif/esptool/releases/download/v5.1.0/esptool-v5.1.0-windows-amd64.zip
            esptool_tipo_file: zip
            esptool_path_in_zip: esptool-windows-amd64/
            esptool_filename_in_zip: esptool.exe
            script_name: flash_firmware.bat
          - name: linux-amd-64bit
            runner: ubuntu-latest
            esptool_url: https://github.com/espressif/esptool/releases/download/v5.1.0/esptool-v5.1.0-linux-amd64.tar.gz
            esptool_tipo_file: tar.gz
            esptool_path_in_zip: esptool-linux-amd64/
            esptool_filename_in_zip: esptool
            script_name: flash_firmware.sh
          - name: macos-64bit
            runner: macos-latest
            esptool_url: https://github.com/espressif/esptool/releases/download/v5.1.0/esptool-v5.1.0-macos-amd64.tar.gz
            esptool_tipo_file: tar.gz
            esptool_path_in_zip: esptool-macos-amd64/
            esptool_filename_in_zip: esptool
            script_name: flash_firmware.sh
            
    steps:
      - name: Download DONGLE firmware .bin artifact
        uses: actions/download-artifact@v4.1.9
        with:
          name: OpenFIRE-DONGLE-${{ matrix.boards.name }}
          path: ./downloaded_firmware

      - name: Prepare staging directory
        shell: bash
        run: |
          mkdir staging_dir
          mv ./downloaded_firmware/OpenFIRE-DONGLE-${{ matrix.boards.name }}.bin ./staging_dir/firmware.bin
          ls -l ./staging_dir

      - name: Download and extract esptool
        shell: bash 
        run: |
          if [[ "${{ matrix.os_config.esptool_tipo_file }}" == "zip" ]]; then
            curl -L -o esptool_archive.zip "${{ matrix.os_config.esptool_url }}"
            unzip -j esptool_archive.zip "${{ matrix.os_config.esptool_path_in_zip }}${{ matrix.os_config.esptool_filename_in_zip }}" -d staging_dir
          fi
          if [[ "${{ matrix.os_config.esptool_tipo_file }}" == "tar.gz" ]]; then
            curl -L -o esptool_archive.tar.gz "${{ matrix.os_config.esptool_url }}"
            tar -xzf esptool_archive.tar.gz -C staging_dir --strip-components=1 "${{ matrix.os_config.esptool_path_in_zip }}${{ matrix.os_config.esptool_filename_in_zip }}"
          fi

          if [[ "${{ matrix.os_config.name }}" == "linux-amd-64bit" || "${{ matrix.os_config.name }}" == "macos-64bit" ]]; then
             chmod +x "staging_dir/${{ matrix.os_config.esptool_filename_in_zip }}"
          fi

      - name: Create flashing script
        shell: bash 
        run: |
          SCRIPT_PATH="staging_dir/${{ matrix.os_config.script_name }}"
          CHIP_TYPE="${{ matrix.boards.chip }}" 
          ESPTOOL_EXECUTABLE_NAME="${{ matrix.os_config.esptool_filename_in_zip }}"
          FLASH_MODE="${{ matrix.boards.flash_mode }}"
          FLASH_FREQ="${{ matrix.boards.flash_freq }}"
          BAUD="460800"
          
          if [[ "${{ matrix.os_config.name }}" == "windows-64bit" ]]; then
          cat <<EOF > "$SCRIPT_PATH"
          @echo off
          echo Flashing OpenFIRE DONGLE Firmware for board: ${{ matrix.boards.name }}
          echo.
          set FIRMWARE_FILE=firmware.bin
          set /p COMPORT="Enter the COM port (e.g. COM3), or leave blank for automatic detection: "
          if not "%COMPORT%"=="" set COMPORT=--port "%COMPORT%"
          $ESPTOOL_EXECUTABLE_NAME --chip $CHIP_TYPE %COMPORT% --baud $BAUD --before default-reset --after hard-reset write-flash -z --flash-mode $FLASH_MODE --flash-freq $FLASH_FREQ --flash-size detect 0x0000 %FIRMWARE_FILE%
          echo.
          if %errorlevel% neq 0 (
            echo ERROR: Firmware DONGLE flashing failed. Check connections and micro.
          ) else (
            echo Firmware DONGLE flashing completed!
          )
          pause
          EOF

          else
          cat <<EOF > "$SCRIPT_PATH"
          #!/bin/bash
          echo "Flashing OpenFIRE DONGLE Firmware for board: ${{ matrix.boards.name }}"
          chmod +x ./$ESPTOOL_EXECUTABLE_NAME
          echo ""
          FIRMWARE_FILE="firmware.bin"
          read -r -p "Enter the COM port (e.g. /dev/ttyUSB0 for Linux, or /dev/tty.usbserial for macOS), or leave blank for automatic detection: " COMPORT
          if [[ -n \$COMPORT ]]; then
            COMPORT="--port \$COMPORT"
          fi
          ./$ESPTOOL_EXECUTABLE_NAME --chip $CHIP_TYPE \$COMPORT --baud $BAUD --before default-reset --after hard-reset write-flash -z --flash-mode $FLASH_MODE --flash-freq $FLASH_FREQ --flash-size detect 0x0000 \$FIRMWARE_FILE
          echo ""
          if [[ \$? -ne 0 ]]; then
            echo "ERROR: Firmware DONGLE flashing failed. Check connections and micro."
          else
            echo "Firmware DONGLE flashing completed!"
          fi
          read -r -p "Press Enter to exit."          
          EOF
          chmod +x "$SCRIPT_PATH"
          fi

      - name: Create ZIP archive
        shell: bash
        run: |
          ARCHIVE_FILENAME="OpenFIRE-DONGLE-${{ matrix.boards.name }}-${{ matrix.os_config.name }}.zip"
          if [[ "${{ matrix.os_config.name }}" == "windows-64bit" ]]; then
            powershell -Command "Compress-Archive -Path staging_dir\* -DestinationPath ${{ github.workspace }}/$ARCHIVE_FILENAME -Force"
          else
            (cd staging_dir && zip -r "${{ github.workspace }}/$ARCHIVE_FILENAME" .)
          fi

      - name: Upload ZIP Assets
        uses: actions/upload-artifact@v4.6.1
        with:
          name: OpenFIRE-DONGLE-${{ matrix.boards.name }}-${{ matrix.os_config.name }}.zip
          path: ${{ github.workspace }}/OpenFIRE-DONGLE-${{ matrix.boards.name }}-${{ matrix.os_config.name }}.zip
          if-no-files-found: error

  create_release:
    needs: package_assets
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.release == 'yes' && github.event.inputs.sistemi_operativi == 'yes' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare Release Body from Template
        id: prepare_body
        run: |
          TEMPLATE_PATH=".github/release_templates/dongle_template.md"
          sed "s/<TAG>/${{ github.event.inputs.tag_name }}/g" "$TEMPLATE_PATH" > final_body.md
          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          cat final_body.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.9
        with:
          path: ./release_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: ${{ github.event.inputs.release_name }}
          body: ${{ env.RELEASE_BODY }}
          draft: ${{ github.event.inputs.draft }}
          prerelease: ${{ github.event.inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload all assets with original names
        run: |
          find ./release_assets -type f -print0 | while IFS= read -r -d '' file; do
            echo "Uploading $file"
            gh release upload ${{ github.event.inputs.tag_name }} "$file" --clobber --repo ${{ github.repository }}
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}