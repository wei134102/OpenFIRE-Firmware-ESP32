board_build.core = earlephilhower
board_build.filesystem_size = 0.5m
monitor_speed = 9600
monitor_port = COM3
upload_protocol = picotool
build_type = release
lib_deps = 	${rp2040.lib_deps}
lib_ignore = ${rp2040.lib_ignore}
build_unflags = 
	-DARDUINO_USB_MODE=1
	${common.build_unflags}
build_flags = 
	-D ARDUINO_RASPBERRY_PI_PICO_2W
	-D ARDUINO_USB_MODE=0
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D PIO_FRAMEWORK_ARDUINO_ENABLE_BLUETOOTH
	${common.build_flags}
platform_packages = ${rp2040.platform_packages}
board_build.filesystem = littlefs ; DICE A PLATFORMIO DI USARE LittleFS PER COPIARE I FILE DELLA DIRECTORY DATA DEL PROGETTO CON LA FUNZIONE UPLOAD SE SI VUOLE USARE
lib_extra_dirs = ../shared_lib
lib_ldf_mode = chain
lib_compat_mode = strict

[env:rpipico2]
platform = ${rp2040.platform}
framework = arduino
board = rpipico2
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m
monitor_speed = 9600
monitor_port = COM3
upload_protocol = picotool
build_type = release
lib_deps = 	${rp2040.lib_deps}
lib_ignore = 
    HID_Bluetooth
    PicoBluetoothHID
	${rp2040.lib_ignore}
build_unflags = 
	-DARDUINO_USB_MODE=1
	${common.build_unflags}
build_flags = 
	-D ARDUINO_RASPBERRY_PI_PICO_2
	-D ARDUINO_USB_MODE=0
	-D ARDUINO_USB_CDC_ON_BOOT=1
	${common.build_flags}
platform_packages = ${rp2040.platform_packages}
board_build.filesystem = littlefs ; DICE A PLATFORMIO DI USARE LittleFS PER COPIARE I FILE DELLA DIRECTORY DATA DEL PROGETTO CON LA FUNZIONE UPLOAD SE SI VUOLE USARE
lib_extra_dirs = ../shared_lib
lib_ldf_mode = chain
lib_compat_mode = strict
