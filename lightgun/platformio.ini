[env:ESP32_S3_WROOM1_DevKitC_1_N16R8]
platform = ${esp32.platform}
board = ESP32-S3-WROOM-1-DevKitC-1-N16R8
framework = arduino
monitor_speed = 9600 ;115200
lib_deps = ${esp32.lib_deps}
lib_ignore = ${esp32.lib_ignore}
build_unflags = 
	-DARDUINO_USB_MODE=1
	-DBOARD_HAS_PSRAM   ; (disabilita PSRAM) serve per utilizzare in sicurezza i pin gpio 35,36,37 che altrimenti vengo usati dalla PSRAM di 8Mb che è OCTAL spi - opi 
	${common.build_unflags}
build_flags = 
	-D NEOPIXEL_PIN=48          ; neopixel integrato sulla board - commentare per disabilitarlo ; se si attiva si ail custom che quello sulla board funzioneranno entrambi
	;-D NEOPIXEL_ENABLEPIN ; il neopixel sulla board non ha bisogna di pin di abilitazione, in caso dovesse servire inserire il pin
	;-D DISABLE_FS_H_WARNING
	-D ARDUINO_ESP32_S3_WROOM1_DevKitC_1_N16R8
	-D ARDUINO_ESP32_S3_WROOM1_DevKitC_1
	-D OPENFIRE_WIRELESS_ENABLE
	-D OPENFIRE_WIRELESS_DEVICE_ESPNOW
	;-D OPENFIRE_ESPNOW_WIFI_POWER=68 ; se non viene messo questo flag viene impostata a 68 il range è da 8 a 84 che corrisponde ad un valore x4 di db tra 2 a 21 db
	;-D OPENFIRE_ESPNOW_WIFI_CHANNEL=12 ; se non viene messo questo flag viene impostata a 12
	-D OPENFIRE_AUTO_CHANNEL_ESPNOW_WIFI ; imposta la ricerca automatica del canale ideale per la trasmissione espnow
	-D OPENFIRE_USE_ESPNOW_UNIFIED_PACKET ; TRASMETTE SEMPRE TUTTI I PACCHETTI MOUSE, KEYBORD O JOYPAD INSIEME IN UNICO PACCHETTO
	-D ARDUINO_USB_MODE=0
	-D ARDUINO_USB_CDC_ON_BOOT=1
	${common.build_flags}
platform_packages = ${esp32.platform_packages}
board_build.partitions = ../shared_boards/partitions/default_OF_16MB.csv
board_build.filesystem = littlefs ; DICE A PLATFORMIO DI USARE LittleFS PER COPIARE I FILE DELLA DIRECTORY DATA DEL PROGETTO CON LA FUNZIONE UPLOAD SE SI VUOLE USARE
lib_extra_dirs = 
	../shared_lib
lib_ldf_mode = chain
lib_compat_mode = strict

