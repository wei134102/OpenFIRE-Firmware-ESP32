;default_envs = ESP32_S3_WROOM1_DevKitC_1_N8R2  ;ESP32S3 Wroom - FLASH 8Mb  (QUAD spi - qio) PSRAM 2Mb (QUAD spi - qio)  - 512KB SRAM, 384KB ROM - Xtensa 32-bit LX7 dual-core at 240 MHz - Adopts ESP32-S3 Rev 0
default_envs = LILYGO_T_DONGLE_S3              ;ESP32S3 R8    - FLASH 16Mb (QUAD spi - qio) NO PSRAM                    - 512KB SRAM, 384KB ROM - Xtensa 32-bit LX7 dual-core at 240 MHz - Adopts ESP32-S3 R8  
;default_envs = GNPE_POCKET_DONGLE_S3_N16R8     ;ESP32S3       - FLASH 16Mb (QUAD spi - qio) PSRAM 8Mb (OCTAL spi - opi) - 512KB SRAM, 384KB ROM - Xtensa 32-bit LX7 dual-core at 240 MHz - Adopts ESP32-S3  - ON ALIEXPRESS  
;default_envs = POCKET_DONGLE_S3               ;ESP32-S3 Pocket Dongle (0.96" ST7735S 80x160)
;default_envs = ESP32_S3_SuperMini             ;ESP32 S3 SuperMini + SSD1306 OLED
;default_envs = ESP32_S3_N8R8                  ;ESP32 S3 N8R8 (LC@SC / Super Mini) + SSD1306 OLED
;default_envs = WAVESHARE_ESP32_S3_PICO         ;ESP32S3 Pico  - FLASH 16Mb (QUAD spi - qio) PSRAM 2Mb (QUAD spi - qio)  - 512KB SRAM, 384KB ROM - Xtensa 32-bit LX7 dual-core at 240 MHz - Adopts ESP32-S3R2
;default_envs = WAVESHARE_ESP32_S3_ZERO_N8R8    ;ESP32S3 Mini  - FLASH 8Mb  (QUAD spi - qio) PSRAM 8Mb (OCTAL spi - opi) - 512KB SRAM, 384KB ROM - Xtensa 32-bit LX7 dual-core at 240 MHz - Adopts ESP32-S3R2
;default_envs = WAVESHARE_ESP32_S3_ZERO_N4R2    ;ESP32S3 Mini  - FLASH 4Mb  (QUAD spi - qio) PSRAM 2Mb (QUAD spi - qio)  - 512KB SRAM, 384KB ROM - Xtensa 32-bit LX7 dual-core at 240 MHz - Adopts ESP32-S3R2

; Le impostazioni globali delle cartelle vanno qui!
boards_dir = ../shared_boards

[env]

[esp32]
platform_packages = 

[common]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.39    ; Arduino Release v3.3.9 based on ESP-IDF v5.5.4
;platform = https://github.com/pioarduino/platform-espressif32.git#55.03.38-1 ; Arduino Release v3.3.8 based on ESP-IDF v5.5.4

lib_deps = 
	adafruit/Adafruit ST7735 and ST7789 Library @1.11.0
	Adafruit TinyUSB Library = https://github.com/adafruit/Adafruit_TinyUSB_Arduino.git#3.7.7
    LovyanGFX Library = https://github.com/lovyan03/LovyanGFX.git#1.2.21
	adafruit/Adafruit SSD1306@^2.5.14

build_unflags = 
	-std=gnu++11
	-std=gnu11
    -Og

build_flags = 
    -D DONGLE
	-D USE_TINYUSB
    -D USE_LOVYAN_GFX
	-D OLED_MENU_ZH
	-I ../shared_lib/display
	-std=gnu++17
	-std=gnu17
    -O2
	
[display_ESP32_S3_WROOM1_DevKitC_1]

;                                          SER     OTG
;                                      ___(USB)___(USB)___  
;                                (GND) |x)  1  PIN  44 (x| (GND)     --> GND display
;                                (GND) |x)  2       43 (-| (5V OUT-IN)
;                            (GPIO 19) |-)  3       42 (-| (GPIO 14) --> RES display
;                            (GPIO 20) |-)  4       41 (-| (GPIO 13) 
;                            (GPIO 21) |-)  5       40 (-| (GPIO 12) --> SCL display
;                            (GPIO 47) |-)  6       39 (-| (GPIO 11) --> SDA display
;                            (GPIO 48) |-)  7       38 (-| (GPIO 10) --> CS  display
;                            (GPIO 45) |-)  8       37 (-| (GPIO 09) --> DC display
;                            (GPIO 00) |-)  9       36 (-| (GPIO 46)
;                            (GPIO 35) |-) 10       35 (-| (GPIO 03)
;                            (GPIO 36) |-) 11       34 (-| (GPIO 08) 
;                            (GPIO 37) |-) 12       33 (-| (GPIO 18) 
;                            (GPIO 38) |-) 13       32 (-| (GPIO 17) 
;                            (GPIO 39) |-) 14       31 (-| (GPIO 16) 
;                            (GPIO 40) |-) 15       30 (-| (GPIO 15) --> BLK display
;                            (GPIO 41) |-) 16       29 (-| (GPIO 07)
;                            (GPIO 42) |-) 17       28 (-| (GPIO 06)
;                            (GPIO 02) |-) 18       27 (-| (GPIO 05)
;                            (GPIO 01) |-) 19       26 (-| (GPIO 04)
;                                 (RX) |-) 20       25 (-| (RST)
;                                 (TX) |-) 21       24 (p| (3V3 OUT)
;                                (GND) |x) 22  PIN  23 (p| (3V3 OUT) --> VCC display
;                                      |_________________|  
;										   | ANTENNA |
;										   |_________|


build_unflags = 

build_flags = 
    -D USER_SETUP_LOADED        ;solo adafruit
    -D ST7735_DRIVER            ;solo adafruit
    -D SPI_HOST=SPI2_HOST       ;solo lgfx
    -D SPI_MODE=0               ;solo lgfx
    -D SPI_FREQUENCY=80000000
    -D TFT_MISO=-1
    -D TFT_MOSI=11              ; SDA  on board display
    -D TFT_SCLK=12              ; SCL  on board display
    -D TFT_CS=10                ; CS   on board display
    -D TFT_DC=9                 ; DC   on board display
    -D TFT_RST=14               ; RES  on board display
    -D TFT_PIN_BL=15            ; BLK  on board display (retroilluminazione)
    -D TFT_PIN_BL_PWM_CHANNEL=-1 ;solo lgfx
    -D TFT_WIDTH=80
    -D TFT_HEIGHT=160
    -D TFT_OFFSET_X=26           ;solo lgfx
    -D TFT_OFFSET_Y=1           ;solo lgfx
    -D TFT_INVERT=1             ;solo lgfx
    -D TFT_RGB_ORDER=0
    -D LOAD_GLCD                ;solo adafruit
    -D LOAD_FONT2               ;solo adafruit
    -D LOAD_FONT4               ;solo adafruit
    -D LOAD_FONT6               ;solo adafruit
    -D LOAD_FONT7               ;solo adafruit
    -D LOAD_FONT8               ;solo adafruit
    -D LOAD_GFXFF               ;solo adafruit
    -D SMOOTH_FONT              ;solo adafruit
    -D ST7735_GREENTAB160x80    ;solo adafruit

