[display_WAVESHARE_ESP32_S3_PICO]
                    
;                                     ______(*USB*)______     
;                           (GPIO 11) |-)  1  PIN  40 (-| (VBUS)
;                           (GPIO 12) |-)  2       39 (-| (VSYS)
;     GND display       <--     (GND) |x)  3       38 (x| (GND)
;                           (GPIO 13) |-)  4       37 (x| (EN)
;                           (GPIO 14) |-)  5       36 (p| (3V3 OUT) --> VCC display    
;                           (GPIO 15) |-)  6       35 (x| (GPIO 10)   
;                           (GPIO 16) |-)  7       34 (-| (GPIO 09)
;                               (GND) |x)  8       33 (x| (GND) 
;                           (GPIO 17) |-)  9       32 (-| (GPIO 08)
;                           (GPIO 18) |-) 10       31 (-| (GPIO 07)
;                           (GPIO 33) |-) 11       30 (x| (RUN)
;                           (GPIO 34) |-) 12       29 (-| (GPIO 06)
;                               (GND) |x) 13       28 (x| (GND)
;     BLK display       <-- (GPIO 35) |-) 14       27 (-| (GPIO 05)
;     CS  display       <-- (GPIO 36) |-) 15       26 (-| (GPIO 04)
;     DC  display       <-- (GPIO 37) |-) 16       25 (-| (GPIO 02)
;     RES display       <-- (GPIO 38) |-) 17       24 (-| (GPIO 01)
;                               (GND) |x) 18       23 (x| (GND)
;     SDA display       <-- (GPIO 39) |-) 19       22 (-| (GPIO 41)
;     SCL display       <-- (GPIO 40) |-) 20  PIN  21 (-| (GPIO 42)
;                                     |_________________|

build_unflags = 

build_flags = 
    -D USER_SETUP_LOADED        ;solo adafruit
    -D ST7735_DRIVER            ;solo adafruit
    -D SPI_HOST=SPI2_HOST       ;solo lgfx
    -D SPI_MODE=0               ;solo lgfx
    -D SPI_FREQUENCY=80000000
    -D TFT_MISO=-1
    -D TFT_MOSI=39              ; SDA  on board display - 39 GPIO micro = PIN micro 19
    -D TFT_SCLK=40              ; SCL  on board display - 40 GPIO micro = PIN micro 20
    -D TFT_CS=36                ; CS   on board display - 36 GPIO micro = PIN micro 15
    -D TFT_DC=37                ; DC   on board display - 37 GPIO micro = PIN micro 16
    -D TFT_RST=38               ; RES  on board display - 38 GPIO micro = PIN micro 17
    -D TFT_PIN_BL=35            ; BLK  on board display - 35 GPIO micro = PIN micro 14  ;solo lgfx
    ;-D TFT_PIN_VCC=PIN 36      ; 3.3 V - PIN micro 36
    ;-D TFT_PIN_GND=PIN 3       ; GND   - PIN micro 3
    -D TFT_PIN_BL_PWM_CHANNEL=-1 ;solo lgfx
    -D TFT_WIDTH=80
    -D TFT_HEIGHT=160
    -D TFT_OFFSET_X=26           ;solo lgfx
    -D TFT_OFFSET_Y=1           ;solo lgfx
    -D TFT_INVERT=1             ;solo lgfx
    -D TFT_RGB_ORDER=0
    -D LOAD_GLCD                ;solo adafruit
    -D LOAD_FONT2               ;solo adafruit
    -D LOAD_FONT4               ;solo adafruit
    -D LOAD_FONT6               ;solo adafruit
    -D LOAD_FONT7               ;solo adafruit
    -D LOAD_FONT8               ;solo adafruit
    -D LOAD_GFXFF               ;solo adafruit
    -D SMOOTH_FONT              ;solo adafruit
    -D ST7735_GREENTAB160x80    ;solo adafruit

