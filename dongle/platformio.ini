    -D TFT_CS=6                 ; CS   on board display
    -D TFT_DC=7                 ; DC   on board display
    -D TFT_RST=8                ; RES  on board display
    -D TFT_PIN_BL=9             ; BLK  on board display (retroilluminazione)
