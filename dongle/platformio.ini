[env:ESP32_S3_SuperMini]
platform = ${common.platform}
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 9600 ;115200
lib_deps = 
	${common.lib_deps}
build_unflags = 
	-D ARDUINO_USB_MODE=1
	${common.build_unflags}
build_flags = 
	; Match lightgun env ESP32_S3_super_mini (USB/board + App presets)
	-D ARDUINO_ESP32_S3_super_mini
	-D OPENFIRE_WIRELESS_ENABLE
	-D OPENFIRE_WIRELESS_DEVICE_ESPNOW
	-D OPENFIRE_AUTO_CHANNEL_ESPNOW_WIFI
	-D OPENFIRE_USE_ESPNOW_UNIFIED_PACKET
	-D ARDUINO_USB_MODE=0
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D USES_OLED_DISPLAY
	-D USE_SSD1306_OLED
	; Common 0.96\" SSD1306 I2C on Super Mini shields — change if your module uses 8/9 or 21/22
	-D OLED_SDA=12
	-D OLED_SCL=13
	-D OLED_I2C_ADDR=0x3C
	${common.build_flags}
board_build.partitions = ../shared_boards/partitions/default_OF_4MB.csv
platform_packages = ${esp32.platform_packages}
lib_extra_dirs = ../shared_lib
lib_ldf_mode = chain
; So shared_lib picks the same -D flags as the dongle app (OLED path, UNIFIED, etc.)
lib_compat_mode = soft

