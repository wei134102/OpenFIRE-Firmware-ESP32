	${common.build_unflags}
	${display_POCKET_DONGLE_S3.build_unflags}
build_flags = 
	-D OPENFIRE_WIRELESS_ENABLE
	-D OPENFIRE_WIRELESS_DEVICE_ESPNOW
	;-D OPENFIRE_ESPNOW_WIFI_POWER=68 ; se non viene messo questo flag viene impostata a 84
	;-D OPENFIRE_ESPNOW_WIFI_CHANNEL=12 ; se non viene messo questo flag viene impostata a 12
    ;-D OPENFIRE_ESPNOW_WIFI_POWER_AUTO ; per motivi di test
    -D OPENFIRE_AUTO_CHANNEL_ESPNOW_WIFI
	-D OPENFIRE_USE_ESPNOW_UNIFIED_PACKET
	-D ARDUINO_USB_MODE=0
    -D ARDUINO_USB_CDC_ON_BOOT=1
	-D DEVICE_POCKET_DONGLE_S3
	-D USES_DISPLAY
	${common.build_flags}
